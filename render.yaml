# Render Blueprint — deploys both services from one repo.
# Docs: https://render.com/docs/blueprint-spec

services:

  # ── Backend: Express API ──────────────────────────────────────────────────
  - type: web
    name: flowtrack-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Set these manually in the Render dashboard after first deploy:
      - key: MONGO_URI
        sync: false          # paste your Atlas URI in Render dashboard
      - key: CLIENT_URL
        sync: false          # paste your Render frontend URL e.g. https://flowtrack.onrender.com

  # ── Frontend: React Static Site ───────────────────────────────────────────
  - type: web
    name: flowtrack-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # SPA fallback — send all paths to index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this in Render dashboard to your API service URL:
      - key: VITE_API_URL
        sync: false          # e.g. https://flowtrack-api.onrender.com/api